<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رتم — تتبع العادات والتدوين</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="رتم">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #ffffff;
    --surface: #f6f6f6;
    --surface-2: #ececec;
    --surface-3: #e0e0e0;
    --text: #111111;
    --text-dim: #6b6b6b;
    --text-faint: #a3a3a3;
    --border: #e0e0e0;
    --accent: #111111;
    --accent-contrast: #ffffff;
    --track: #e8e8e8;
    --danger: #b53a3a;
    --radius: 14px;
    --radius-sm: 9px;
  }
  body[data-theme="dark"]{
    --bg: #0a0a0a;
    --surface: #161616;
    --surface-2: #202020;
    --surface-3: #2a2a2a;
    --text: #f5f5f5;
    --text-dim: #9a9a9a;
    --text-faint: #626262;
    --border: #262626;
    --accent: #ffffff;
    --accent-contrast: #0a0a0a;
    --track: #202020;
    --danger: #d97a7a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;line-height:1.5;transition:background .2s,color .2s;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .app{max-width:960px;margin:0 auto;padding:28px 20px 80px;}

  .hero{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--text);gap:16px;flex-wrap:wrap;}
  .hero h1{font-size:38px;font-weight:900;margin:0;letter-spacing:-.5px;}
  .hero .sub{color:var(--text-dim);font-size:14px;margin-top:4px;font-weight:400;}
  .hero-right{display:flex;align-items:center;gap:10px;}
  .today-badge{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);background:var(--surface);border:1px solid var(--border);padding:6px 12px;border-radius:20px;white-space:nowrap;}
  .theme-btn{width:38px;height:38px;border-radius:50%;background:var(--surface);border:1px solid var(--border);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text);transition:.15s;}
  .theme-btn:hover{background:var(--surface-2);}

  .tabs{display:flex;gap:6px;margin-bottom:22px;background:var(--surface);padding:5px;border-radius:12px;border:1px solid var(--border);width:fit-content;flex-wrap:wrap;}
  .tab{padding:9px 18px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text-dim);transition:.15s;user-select:none;}
  .tab.active{background:var(--accent);color:var(--accent-contrast);}
  .tab:not(.active):hover{color:var(--text);background:var(--surface-2);}

  .view{display:none;}
  .view.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  .add-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px;}
  .add-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .add-row input[type=text]{flex:1;min-width:180px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:var(--radius-sm);font-family:inherit;font-size:15px;outline:none;transition:.15s;}
  .add-row input[type=text]:focus{border-color:var(--text);}
  .add-row input[type=text]::placeholder{color:var(--text-faint);}
  .btn{background:var(--accent);color:var(--accent-contrast);border:none;padding:11px 22px;border-radius:var(--radius-sm);font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:.15s;white-space:nowrap;}
  .btn:hover{opacity:.85;}
  .btn:active{transform:scale(.97);}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim);}
  .btn.ghost:hover{color:var(--text);border-color:var(--text);}
  .btn.sm{padding:7px 14px;font-size:12.5px;}

  .habit-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 18px 16px;margin-bottom:16px;}
  .habit-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;}
  .habit-name-wrap{display:flex;align-items:center;gap:10px;min-width:0;}
  .monogram{width:32px;height:32px;border-radius:50%;background:var(--surface-3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
  .habit-name{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .stats{display:flex;gap:14px;align-items:center;flex-shrink:0;}
  .stat{text-align:center;}
  .stat .num{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;}
  .stat .lbl{font-size:10px;color:var(--text-faint);}
  .del-btn{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:18px;padding:2px 6px;border-radius:6px;transition:.15s;line-height:1;}
  .del-btn:hover{color:var(--danger);}
  .del-btn.confirm{color:var(--accent-contrast);background:var(--danger);font-size:11px;padding:6px 10px;}

  .slide-wrap{margin-bottom:2px;}
  .slide-track{direction:ltr;position:relative;height:46px;border-radius:23px;background:var(--surface-2);border:1px solid var(--border);overflow:hidden;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:pan-y;}
  .slide-fill{position:absolute;inset:0;background:var(--accent);width:0%;transition:width .05s linear;}
  .slide-fill.animated{transition:width .25s ease;}
  .slide-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--text-dim);pointer-events:none;letter-spacing:.2px;}
  .slide-label.on-fill{color:var(--accent-contrast);}
  .slide-thumb{position:absolute;top:3px;right:3px;width:40px;height:40px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;transition:right .05s linear,background .15s;box-shadow:0 1px 3px rgba(0,0,0,.15);}
  .slide-thumb.animated{transition:right .25s ease;}
  .slide-track.done .slide-thumb{background:var(--accent-contrast);color:var(--accent);}

  .heatmap-scroll{overflow-x:auto;padding-bottom:4px;direction:ltr;}
  .heatmap-scroll::-webkit-scrollbar{height:6px;}
  .heatmap-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  .heatmap{display:flex;flex-direction:row-reverse;gap:3px;direction:rtl;width:fit-content;margin-right:auto;margin-left:0;}
  .week-col{display:flex;flex-direction:column;gap:3px;}
  .day-cell{width:11px;height:11px;border-radius:3px;background:var(--track);cursor:pointer;transition:.1s;position:relative;}
  .day-cell:hover{outline:1px solid var(--text-dim);}
  .day-cell.filled{background:var(--accent) !important;}
  .day-cell.future{cursor:not-allowed;opacity:.35;}
  .day-cell.today{outline:1.5px solid var(--text);}
  .month-labels{display:flex;flex-direction:row-reverse;gap:3px;font-size:10px;color:var(--text-faint);margin-bottom:5px;direction:rtl;width:fit-content;margin-right:auto;}
  .month-labels span{width:11px;overflow:visible;white-space:nowrap;}

  .empty-state{text-align:center;padding:50px 20px;color:var(--text-faint);}
  .empty-state .big{font-size:32px;margin-bottom:8px;}

  /* History page */
  .hist-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px;}
  .hist-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .year-nav{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;}
  .year-nav button{background:none;border:none;color:var(--text);cursor:pointer;font-size:15px;padding:2px 4px;}
  .year-nav .yr{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;}

  /* Dashboard */
  .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:20px;}
  .dash-tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center;}
  .dash-tile .big-num{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700;}
  .dash-tile .lbl{font-size:12px;color:var(--text-dim);margin-top:4px;}
  .ring-wrap{display:flex;justify-content:center;margin-bottom:6px;}
  .bar-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
  .bar-row:last-child{border-bottom:none;}
  .bar-name{width:120px;flex-shrink:0;font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-track{flex:1;height:10px;background:var(--surface-2);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--accent);border-radius:6px;transition:width .4s ease;}
  .bar-pct{width:42px;flex-shrink:0;text-align:left;font-family:'JetBrains Mono',monospace;font-size:13px;}
  .week-matrix{display:grid;grid-template-columns:130px repeat(7,1fr);gap:6px;align-items:center;margin-top:6px;}
  .wm-head{font-size:10px;color:var(--text-faint);text-align:center;}
  .wm-name{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .wm-cell{width:100%;aspect-ratio:1;border-radius:6px;background:var(--surface-2);}
  .wm-cell.on{background:var(--accent);}

  .journal-layout{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;}
  .cal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;flex:1;min-width:290px;}
  .cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .cal-nav .label{font-weight:700;font-size:16px;}
  .nav-btn{background:var(--surface-2);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;}
  .nav-btn:hover{border-color:var(--text);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .cal-dow{text-align:center;font-size:11px;color:var(--text-faint);padding-bottom:6px;}
  .cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:9px;cursor:pointer;font-size:13px;font-family:'JetBrains Mono',monospace;background:var(--surface-2);position:relative;transition:.12s;}
  .cal-day:hover{background:var(--surface-3);}
  .cal-day.today{border:1.5px solid var(--text);font-weight:700;}
  .cal-day.selected{background:var(--accent);color:var(--accent-contrast);font-weight:700;}
  .cal-day.empty{background:none;cursor:default;}
  .cal-day .has-entry{position:absolute;bottom:5px;width:4px;height:4px;border-radius:50%;background:var(--text-dim);}
  .cal-day.selected .has-entry{background:var(--accent-contrast);}
  .entry-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;flex:1.3;min-width:300px;}
  .entry-date{font-size:14px;color:var(--text-dim);margin-bottom:10px;font-weight:700;}
  .entry-date .mono{color:var(--text);}
  textarea{width:100%;min-height:260px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:14px;font-family:'Cairo',sans-serif;font-size:14.5px;line-height:1.7;resize:vertical;outline:none;transition:.15s;}
  textarea:focus{border-color:var(--text);}
  textarea::placeholder{color:var(--text-faint);}
  .save-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
  .save-hint{font-size:12px;color:var(--text-faint);}

  .loading{text-align:center;padding:100px 20px;color:var(--text-faint);font-size:14px;}

  @media (max-width:600px){
    .hero h1{font-size:28px;}
    .stats{gap:10px;}
    .stat .num{font-size:15px;}
    .bar-name{width:80px;}
    .week-matrix{grid-template-columns:80px repeat(7,1fr);}
  }
</style>
</head>
<body data-theme="light">
<div class="app" id="app">
  <div class="loading" id="loading">جارٍ تحميل بياناتك…</div>
</div>

<script>
const DOW_LABELS = ['أحد','اثن','ثلا','أرب','خمي','جمع','سبت'];
const MONTH_LABELS = ['ينا','فبر','مار','أبر','ماي','يون','يول','أغس','سبت','أكت','نوف','ديس'];

let state = { habits: [], journal: {} };
let theme = 'light';
let activeTab = 'habits';
let histYear = new Date().getFullYear();
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let selectedDate = fmtDate(new Date());
let confirmingDelete = null;
let audioCtx = null;

function fmtDate(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
function todayStr(){ return fmtDate(new Date()); }
function uid(){ return 'h_'+Math.random().toString(36).slice(2,10); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }

// ---------- Local storage layer (IndexedDB) — data lives on this device only ----------
const DB_NAME = 'ratm-db';
const STORE_NAME = 'kv';
function openDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => { req.result.createObjectStore(STORE_NAME); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
const storage = {
  async get(key){
    try{
      const db = await openDB();
      return new Promise((resolve, reject)=>{
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).get(key);
        req.onsuccess = () => resolve(req.result !== undefined ? { key, value: req.result } : null);
        req.onerror = () => reject(req.error);
      });
    }catch(e){ return null; }
  },
  async set(key, value){
    try{
      const db = await openDB();
      return new Promise((resolve, reject)=>{
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(value, key);
        tx.oncomplete = () => resolve({ key, value });
        tx.onerror = () => reject(tx.error);
      });
    }catch(e){ return null; }
  }
};

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

async function loadState(){
  try{ const h = await storage.get('ratm-habits'); if(h && h.value) state.habits = JSON.parse(h.value); }catch(e){ state.habits = []; }
  try{ const j = await storage.get('ratm-journal'); if(j && j.value) state.journal = JSON.parse(j.value); }catch(e){ state.journal = {}; }
  try{ const t = await storage.get('ratm-theme'); if(t && t.value) theme = t.value; }catch(e){ theme='light'; }
  // backfill createdAt for habits saved before this feature existed
  state.habits.forEach(h=>{
    if(!h.createdAt){
      const dates = Object.keys(h.entries||{}).sort();
      h.createdAt = dates.length ? dates[0] : todayStr();
    }
  });
  // seed the requested routine on first-ever use
  if(state.habits.length===0){
    const seedNames = [
      'الاستيقاظ ٥ ص','أذكار الصباح','صلاة الفجر','قراءة ٥٠ صفحة قرآن','صلاة الظهر',
      'صلاة العصر','أذكار المساء','مذاكرة ٣ ساعات','تمارين مقاومة','صلاة المغرب',
      'تعلّم ذاتي ساعة','كرياتين ٥ غرام','١٠ آلاف خطوة','صلاة العشاء','قراءة ساعة',
      'كتابة يوميات','النوم ١٠ م'
    ];
    state.habits = seedNames.map(name=>({ id: uid(), name, entries: {}, createdAt: todayStr() }));
    await saveHabits();
  }
}
async function saveHabits(){ try{ await storage.set('ratm-habits', JSON.stringify(state.habits)); }catch(e){ console.error(e); } }
async function saveJournal(){ try{ await storage.set('ratm-journal', JSON.stringify(state.journal)); }catch(e){ console.error(e); } }
async function saveTheme(){ try{ await storage.set('ratm-theme', theme); }catch(e){ console.error(e); } }

function playChime(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    [523.25,659.25,783.99].forEach((freq,i)=>{
      const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
      o.type='sine'; o.frequency.value=freq;
      const t0 = now + i*0.07;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.22, t0+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+0.28);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t0); o.stop(t0+0.3);
    });
  }catch(e){}
}

function computeStreaks(habit){
  const entries = habit.entries || {};
  const dates = Object.keys(entries).filter(d=>entries[d]).sort();
  if(dates.length===0) return {current:0, best:0, total:0};
  const set = new Set(dates);
  let cur = 0;
  let cursor = new Date();
  if(!set.has(fmtDate(cursor))) cursor.setDate(cursor.getDate()-1);
  while(set.has(fmtDate(cursor))){ cur++; cursor.setDate(cursor.getDate()-1); }
  let best=0, run=0, prev=null;
  for(const d of dates){
    if(prev){ const diff = daysBetween(prev,d); run = diff===1 ? run+1 : 1; } else run = 1;
    best = Math.max(best, run); prev = d;
  }
  return {current:cur, best, total:dates.length};
}

function computePercentage(habit){
  const total = Object.keys(habit.entries||{}).filter(d=>habit.entries[d]).length;
  const start = habit.createdAt || todayStr();
  const elapsed = Math.max(1, daysBetween(start, todayStr())+1);
  return Math.min(100, Math.round((total/elapsed)*100));
}

function buildYearWeeks(year){
  const start = new Date(year,0,1); const end = new Date(year,11,31);
  const startDow = start.getDay();
  const firstCellDate = new Date(start); firstCellDate.setDate(firstCellDate.getDate()-startDow);
  const weeks=[]; let cursor = new Date(firstCellDate);
  while(cursor<=end){
    const week=[];
    for(let i=0;i<7;i++){ week.push(cursor.getFullYear()===year ? fmtDate(cursor) : null); cursor.setDate(cursor.getDate()+1); }
    weeks.push(week);
  }
  return weeks;
}

function renderHeatmap(habit, year){
  const weeks = buildYearWeeks(year);
  const today = todayStr();
  let monthLabelsHtml = ''; let lastMonth = -1;
  weeks.forEach(week=>{
    const firstReal = week.find(d=>d);
    if(firstReal){
      const m = new Date(firstReal).getMonth();
      if(m!==lastMonth){ monthLabelsHtml += `<span>${MONTH_LABELS[m]}</span>`; lastMonth=m; } else monthLabelsHtml += `<span></span>`;
    } else monthLabelsHtml += `<span></span>`;
  });
  let gridHtml = '';
  weeks.forEach(week=>{
    let colHtml = '<div class="week-col">';
    week.forEach(d=>{
      if(!d){ colHtml += `<div class="day-cell" style="visibility:hidden"></div>`; return; }
      const filled = !!habit.entries[d];
      const isFuture = d > today;
      const isToday = d === today;
      colHtml += `<div class="day-cell ${filled?'filled':''} ${isFuture?'future':''} ${isToday?'today':''}"
        title="${d}" data-habit="${habit.id}" data-date="${d}" ${isFuture?'':'onclick="toggleEntry(this)"'}></div>`;
    });
    colHtml += '</div>'; gridHtml += colHtml;
  });
  return `<div class="month-labels">${monthLabelsHtml}</div><div class="heatmap-scroll"><div class="heatmap">${gridHtml}</div></div>`;
}

window.toggleEntry = function(el){
  const id = el.getAttribute('data-habit'); const date = el.getAttribute('data-date');
  const habit = state.habits.find(h=>h.id===id); if(!habit) return;
  const wasOn = !!habit.entries[date];
  habit.entries[date] = !wasOn;
  if(!habit.entries[date]) delete habit.entries[date];
  if(!wasOn && date===todayStr()) playChime();
  saveHabits(); render();
};

function renderSlide(habit){
  const today = todayStr(); const done = !!habit.entries[today];
  return `
    <div class="slide-wrap">
      <div class="slide-track ${done?'done':''}" id="track-${habit.id}" data-habit="${habit.id}" onpointerdown="slideStart(event,'${habit.id}')">
        <div class="slide-fill animated" id="fill-${habit.id}" style="width:${done?'100':'0'}%"></div>
        <div class="slide-label ${done?'on-fill':''}" id="label-${habit.id}">${done ? 'تمت اليوم ✓ — اسحب للإلغاء' : 'اسحب لليمين لتأكيد اليوم →'}</div>
        <div class="slide-thumb animated" id="thumb-${habit.id}" style="right:${done?'calc(100% - 43px)':'3px'}">${done?'✓':'○'}</div>
      </div>
    </div>
  `;
}

let dragState = null;
window.slideStart = function(e, habitId){
  const habit = state.habits.find(h=>h.id===habitId); if(!habit) return;
  const track = document.getElementById('track-'+habitId);
  const thumb = document.getElementById('thumb-'+habitId);
  const fill = document.getElementById('fill-'+habitId);
  const label = document.getElementById('label-'+habitId);
  const rect = track.getBoundingClientRect();
  const wasDone = !!habit.entries[todayStr()];
  thumb.classList.remove('animated'); fill.classList.remove('animated');
  dragState = { habitId, rect, wasDone, track, thumb, fill, label, moved:false };
  try{ track.setPointerCapture(e.pointerId); }catch(err){}
  document.onpointermove = slideMove; document.onpointerup = slideEnd;
};
function slideMove(e){
  if(!dragState) return; dragState.moved = true;
  const { rect, thumb, fill, label } = dragState;
  const thumbW = 40, pad = 3;
  let x = e.clientX - rect.left - thumbW/2;
  const maxX = rect.width - thumbW - pad;
  x = Math.max(0, Math.min(maxX, x));
  const pct = maxX>0 ? x/maxX : 0;
  thumb.style.right = (rect.width - x - thumbW - pad) + 'px';
  fill.style.width = (pct*100) + '%';
  label.classList.toggle('on-fill', pct>0.45);
  dragState._pct = pct;
}
function slideEnd(){
  document.onpointermove = null; document.onpointerup = null;
  if(!dragState) return;
  const { habitId, wasDone, thumb, fill, label, moved, track } = dragState;
  thumb.classList.add('animated'); fill.classList.add('animated');
  const pct = dragState._pct || 0;
  const habit = state.habits.find(h=>h.id===habitId);
  const today = todayStr();
  let shouldBeDone = wasDone;
  if(moved){ shouldBeDone = pct >= 0.6 ? true : (pct <= 0.15 ? false : wasDone); }
  else { shouldBeDone = !wasDone; }
  if(shouldBeDone){
    thumb.style.right = 'calc(100% - 43px)'; fill.style.width = '100%';
    label.textContent = 'تمت اليوم ✓ — اسحب للإلغاء'; label.classList.add('on-fill'); track.classList.add('done');
    if(!wasDone){ habit.entries[today] = true; playChime(); }
  } else {
    thumb.style.right = '3px'; fill.style.width = '0%';
    label.textContent = 'اسحب لليمين لتأكيد اليوم →'; label.classList.remove('on-fill'); track.classList.remove('done');
    if(wasDone){ delete habit.entries[today]; }
  }
  dragState = null; saveHabits(); setTimeout(render, 200);
}

// ---------- Habits view (list only, no calendar) ----------
function renderHabitsView(){
  let html = `
    <div class="add-card">
      <div class="add-row">
        <input type="text" id="new-habit-name" placeholder="اسم عادة جديدة… مثل: قراءة 20 دقيقة" onkeydown="if(event.key==='Enter')addHabit()">
        <button class="btn" onclick="addHabit()">+ إضافة عادة</button>
        <button class="btn ghost sm" onclick="toggleBulk()">إضافة عدة عادات دفعة واحدة</button>
      </div>
      <div id="bulk-wrap" style="display:none;margin-top:12px;">
        <textarea id="bulk-input" placeholder="اكتب كل عادة في سطر منفصل…" style="min-height:120px;"></textarea>
        <div style="margin-top:8px;">
          <button class="btn sm" onclick="bulkAddHabits()">إضافة الكل</button>
        </div>
      </div>
    </div>
  `;
  if(state.habits.length===0){
    html += `<div class="empty-state"><div class="big">◐</div>ابدأ بإضافة أول عادة تريد الالتزام بها</div>`;
  } else {
    state.habits.forEach(habit=>{
      const s = computeStreaks(habit);
      const pct = computePercentage(habit);
      const isConfirming = confirmingDelete===habit.id;
      const initial = habit.name.trim().charAt(0) || '؟';
      html += `
        <div class="habit-card">
          <div class="habit-head">
            <div class="habit-name-wrap">
              <div class="monogram">${escapeHtml(initial)}</div>
              <div class="habit-name">${escapeHtml(habit.name)}</div>
            </div>
            <div class="stats">
              <div class="stat"><div class="num mono">${s.current}🔥</div><div class="lbl">الحالي</div></div>
              <div class="stat"><div class="num mono">${pct}%</div><div class="lbl">النسبة</div></div>
              <div class="stat"><div class="num mono">${s.best}</div><div class="lbl">الأفضل</div></div>
              <button class="del-btn ${isConfirming?'confirm':''}" onclick="deleteHabit('${habit.id}')">${isConfirming?'تأكيد الحذف؟':'✕'}</button>
            </div>
          </div>
          ${renderSlide(habit)}
        </div>
      `;
    });
  }
  return html;
}

window.addHabit = function(){
  const input = document.getElementById('new-habit-name');
  const name = input.value.trim(); if(!name) return;
  state.habits.push({ id: uid(), name, entries: {}, createdAt: todayStr() });
  saveHabits(); render();
};
window.toggleBulk = function(){
  const wrap = document.getElementById('bulk-wrap');
  if(wrap) wrap.style.display = wrap.style.display==='none' ? 'block' : 'none';
};
window.bulkAddHabits = function(){
  const box = document.getElementById('bulk-input');
  const lines = box.value.split('\n').map(l=>l.trim()).filter(Boolean);
  const existing = new Set(state.habits.map(h=>h.name));
  lines.forEach(name=>{
    if(!existing.has(name)){
      state.habits.push({ id: uid(), name, entries: {}, createdAt: todayStr() });
      existing.add(name);
    }
  });
  saveHabits(); render();
};
window.deleteHabit = function(id){
  if(confirmingDelete===id){
    state.habits = state.habits.filter(h=>h.id!==id); confirmingDelete=null; saveHabits();
  } else {
    confirmingDelete = id;
    setTimeout(()=>{ if(confirmingDelete===id){ confirmingDelete=null; render(); } }, 3000);
  }
  render();
};

// ---------- History view (calendar moved here) ----------
function renderHistoryView(){
  if(state.habits.length===0){
    return `<div class="empty-state"><div class="big">▦</div>أضف عادة من صفحة "العادات" لترى سجلها السنوي هنا</div>`;
  }
  let html = `
    <div class="hist-head">
      <div class="year-nav">
        <button onclick="changeHistYear(1)">‹</button>
        <div class="yr">${histYear}</div>
        <button onclick="changeHistYear(-1)">›</button>
      </div>
    </div>
  `;
  state.habits.forEach(habit=>{
    const s = computeStreaks(habit);
    const pct = computePercentage(habit);
    html += `
      <div class="hist-card">
        <div class="habit-head">
          <div class="habit-name-wrap">
            <div class="monogram">${escapeHtml(habit.name.trim().charAt(0)||'؟')}</div>
            <div class="habit-name">${escapeHtml(habit.name)}</div>
          </div>
          <div class="stats">
            <div class="stat"><div class="num mono">${s.current}🔥</div><div class="lbl">الحالي</div></div>
            <div class="stat"><div class="num mono">${pct}%</div><div class="lbl">النسبة</div></div>
            <div class="stat"><div class="num mono">${s.total}</div><div class="lbl">الإجمالي</div></div>
          </div>
        </div>
        ${renderHeatmap(habit, histYear)}
      </div>
    `;
  });
  return html;
}
window.changeHistYear = function(dir){ histYear += dir; render(); };

// ---------- Dashboard ----------
function renderDashboard(){
  if(state.habits.length===0){
    return `<div class="empty-state"><div class="big">◎</div>أضف عادات لترى إحصائياتك هنا</div>`;
  }
  const today = todayStr();
  const doneToday = state.habits.filter(h=>h.entries[today]).length;
  const todayPct = Math.round((doneToday/state.habits.length)*100);

  // week matrix: last 7 days including today
  const last7 = [];
  for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); last7.push(fmtDate(d)); }
  const weekDoneTotal = state.habits.reduce((acc,h)=> acc + last7.filter(d=>h.entries[d]).length, 0);
  const weekPct = Math.round((weekDoneTotal/(state.habits.length*7))*100);

  // month
  const monthStart = new Date(); monthStart.setDate(1);
  const daysThisMonthSoFar = new Date().getDate();
  const monthDoneTotal = state.habits.reduce((acc,h)=>{
    let c=0;
    for(let d=1; d<=daysThisMonthSoFar; d++){
      const ds = `${monthStart.getFullYear()}-${String(monthStart.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if(h.entries[ds]) c++;
    }
    return acc+c;
  },0);
  const monthPct = Math.round((monthDoneTotal/(state.habits.length*daysThisMonthSoFar))*100);

  const sorted = [...state.habits].sort((a,b)=>computePercentage(b)-computePercentage(a));

  let barsHtml = sorted.map(h=>{
    const pct = computePercentage(h);
    return `
      <div class="bar-row">
        <div class="bar-name">${escapeHtml(h.name)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-pct mono">${pct}%</div>
      </div>
    `;
  }).join('');

  let matrixHtml = `<div class="week-matrix">
    <div></div>
    ${last7.map(d=>`<div class="wm-head">${new Date(d).toLocaleDateString('ar-SA',{weekday:'short'})}</div>`).join('')}
  `;
  state.habits.forEach(h=>{
    matrixHtml += `<div class="wm-name">${escapeHtml(h.name)}</div>`;
    last7.forEach(d=>{
      matrixHtml += `<div class="wm-cell ${h.entries[d]?'on':''}"></div>`;
    });
  });
  matrixHtml += `</div>`;

  return `
    <div class="dash-grid">
      <div class="dash-tile"><div class="big-num mono">${todayPct}%</div><div class="lbl">إنجاز اليوم</div></div>
      <div class="dash-tile"><div class="big-num mono">${weekPct}%</div><div class="lbl">آخر 7 أيام</div></div>
      <div class="dash-tile"><div class="big-num mono">${monthPct}%</div><div class="lbl">هذا الشهر</div></div>
      <div class="dash-tile"><div class="big-num mono">${state.habits.length}</div><div class="lbl">عدد العادات</div></div>
    </div>
    <div class="hist-card">
      <div class="habit-name" style="margin-bottom:10px;">نسبة الالتزام لكل عادة</div>
      ${barsHtml}
    </div>
    <div class="hist-card">
      <div class="habit-name" style="margin-bottom:4px;">آخر 7 أيام</div>
      ${matrixHtml}
    </div>
  `;
}

// ---------- Journal ----------
function renderJournalView(){
  const first = new Date(calYear, calMonth, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const today = todayStr();
  let cellsHtml = '';
  for(let i=0;i<startDow;i++) cellsHtml += `<div class="cal-day empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr===today; const isSelected = dateStr===selectedDate;
    const hasEntry = !!(state.journal[dateStr] && state.journal[dateStr].trim());
    cellsHtml += `<div class="cal-day ${isToday?'today':''} ${isSelected?'selected':''}" onclick="selectDate('${dateStr}')">${d}${hasEntry?'<div class="has-entry"></div>':''}</div>`;
  }
  const monthName = new Date(calYear, calMonth, 1).toLocaleDateString('ar-SA-u-nu-latn',{month:'long', year:'numeric'});
  const entryText = state.journal[selectedDate] || '';
  const [sy,sm,sd] = selectedDate.split('-');
  return `
    <div class="journal-layout">
      <div class="cal-card">
        <div class="cal-nav">
          <button class="nav-btn" onclick="changeMonth(1)">‹</button>
          <div class="label">${monthName}</div>
          <button class="nav-btn" onclick="changeMonth(-1)">›</button>
        </div>
        <div class="cal-grid">
          ${DOW_LABELS.map(l=>`<div class="cal-dow">${l}</div>`).join('')}
          ${cellsHtml}
        </div>
      </div>
      <div class="entry-card">
        <div class="entry-date">تدوينة يوم <span class="mono">${sd}/${sm}/${sy}</span></div>
        <textarea id="journal-text" placeholder="اكتب هنا أي شيء يخص هذا اليوم… أفكار، إنجازات، ملاحظات…" oninput="onJournalInput(this.value)">${escapeHtml(entryText)}</textarea>
        <div class="save-row">
          <div class="save-hint" id="save-hint">يُحفظ تلقائيًا</div>
          <button class="btn ghost" onclick="selectDate('${today}')">اذهب لليوم</button>
        </div>
      </div>
    </div>
  `;
}
window.changeMonth = function(dir){
  calMonth += dir;
  if(calMonth<0){ calMonth=11; calYear--; }
  if(calMonth>11){ calMonth=0; calYear++; }
  render();
};
window.selectDate = function(d){ selectedDate = d; render(); };

let saveTimeout=null;
window.onJournalInput = function(val){
  state.journal[selectedDate] = val;
  const hint = document.getElementById('save-hint');
  if(hint) hint.textContent = 'جارٍ الحفظ…';
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async ()=>{
    await saveJournal();
    const h = document.getElementById('save-hint');
    if(h) h.textContent = 'تم الحفظ ✓';
  }, 500);
};

function escapeHtml(s){ const div = document.createElement('div'); div.textContent = s; return div.innerHTML; }

window.toggleTheme = function(){
  theme = theme==='dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', theme);
  saveTheme(); render();
};

function render(){
  document.body.setAttribute('data-theme', theme);
  const app = document.getElementById('app');
  let viewHtml = '';
  if(activeTab==='habits') viewHtml = renderHabitsView();
  else if(activeTab==='dashboard') viewHtml = renderDashboard();
  else if(activeTab==='history') viewHtml = renderHistoryView();
  else viewHtml = renderJournalView();

  app.innerHTML = `
    <div class="hero">
      <div>
        <h1>رتم</h1>
        <div class="sub">تتبّع عاداتك اليومية ودوّن لحظاتك</div>
      </div>
      <div class="hero-right">
        <div class="today-badge mono">${new Date().toLocaleDateString('ar-SA',{weekday:'long', day:'numeric', month:'long'})}</div>
        <div class="theme-btn" onclick="toggleTheme()" title="تبديل النمط">${theme==='dark'?'☀':'☾'}</div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab ${activeTab==='habits'?'active':''}" onclick="setTab('habits')">العادات</div>
      <div class="tab ${activeTab==='dashboard'?'active':''}" onclick="setTab('dashboard')">لوحة التحكم</div>
      <div class="tab ${activeTab==='history'?'active':''}" onclick="setTab('history')">السجل</div>
      <div class="tab ${activeTab==='journal'?'active':''}" onclick="setTab('journal')">التدوين</div>
    </div>
    <div class="view active">${viewHtml}</div>
  `;
}
window.setTab = function(t){ activeTab=t; render(); };

(async function init(){ await loadState(); render(); })();
</script>
